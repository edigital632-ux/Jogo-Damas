<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damas Online</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1c1c2e;
    --border: #2a2a42;
    --gold: #e8c96d;
    --gold2: #f5a623;
    --cream: #f0ead6;
    --red: #e05252;
    --red-dark: #8b1a1a;
    --dark-sq: #1e3a2f;
    --light-sq: #d4b896;
    --glow: rgba(232, 201, 109, 0.15);
    --text: #e8e4d9;
    --muted: #7a7a9a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,201,109,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(224,82,82,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  h1.logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: 0.1em;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(232,201,109,0.4);
    position: relative;
    z-index: 1;
  }

  h1.logo span { color: var(--red); }

  header {
    width: 100%;
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.3rem 0.9rem;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .badge.online { color: #5ecc8b; border-color: #5ecc8b44; }

  /* SCREENS */
  .screen { display: none; width: 100%; max-width: 480px; padding: 2rem 1.5rem; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; }

  /* HOME */
  .tagline {
    font-size: 0.9rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.04em;
  }

  .btn {
    width: 100%;
    padding: 0.9rem 1.5rem;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn:hover::after { opacity: 0.07; }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #1a1000;
  }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-danger {
    background: linear-gradient(135deg, #c94040, var(--red));
    color: white;
  }

  .btn-sm {
    width: auto;
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
  }

  .input-group {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .input-group label {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  input[type="text"] {
    width: 100%;
    padding: 0.8rem 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--gold); }

  .divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 1rem;
    color: var(--muted);
    font-size: 0.8rem;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* LOBBY */
  .room-code-display {
    background: var(--surface2);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 1.2rem 2rem;
    text-align: center;
    width: 100%;
  }

  .room-code-display .label {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
  }

  .room-code-display .code {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(232,201,109,0.5);
  }

  .waiting-dots::after {
    content: '';
    animation: dots 1.5s infinite;
  }

  @keyframes dots {
    0% { content: '.'; }
    33% { content: '..'; }
    66% { content: '...'; }
  }

  .player-slots {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .player-slot {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.8rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .piece-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    font-weight: 700;
  }

  .piece-icon.p1 {
    background: radial-gradient(circle at 35% 35%, #f5a623, #8b4500);
    box-shadow: 0 2px 8px rgba(245,166,35,0.4);
  }

  .piece-icon.p2 {
    background: radial-gradient(circle at 35% 35%, #d44, #6b0000);
    box-shadow: 0 2px 8px rgba(200,50,50,0.4);
  }

  .slot-info { flex: 1; }
  .slot-name { font-size: 0.95rem; font-weight: 500; }
  .slot-status { font-size: 0.75rem; color: var(--muted); }

  /* GAME SCREEN */
  #gameScreen {
    max-width: 600px;
    padding: 1rem;
  }

  .game-header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.8rem;
  }

  .player-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }

  .player-info .name {
    font-size: 0.8rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
  }

  .player-info .pieces-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    line-height: 1;
  }

  .player-info.p1 .pieces-count { color: var(--gold2); }
  .player-info.p2 .pieces-count { color: var(--red); }

  .turn-indicator {
    text-align: center;
    font-size: 0.8rem;
  }

  .turn-indicator .whose {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--gold);
  }

  .turn-indicator .whose.red { color: var(--red); }

  /* BOARD */
  .board-wrap {
    width: 100%;
    aspect-ratio: 1;
    position: relative;
  }

  #board {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    border: 2px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,0.6), 0 0 40px var(--glow);
  }

  .cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: default;
    transition: background 0.15s;
  }

  .cell.dark { background: var(--dark-sq); }
  .cell.light { background: var(--light-sq); }

  .cell.dark.valid {
    background: #2a5c40;
    cursor: pointer;
  }

  .cell.dark.valid::after {
    content: '';
    position: absolute;
    width: 35%;
    height: 35%;
    border-radius: 50%;
    background: rgba(94, 204, 139, 0.4);
    border: 2px solid rgba(94, 204, 139, 0.6);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
  }

  .piece {
    width: 76%;
    height: 76%;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .piece.p1 {
    background: radial-gradient(circle at 35% 35%, #f5a623, #7a3800);
    box-shadow: 0 3px 8px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.3);
    border: 2px solid #a05000;
  }

  .piece.p2 {
    background: radial-gradient(circle at 35% 35%, #e05252, #5a0000);
    box-shadow: 0 3px 8px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.2);
    border: 2px solid #7a0000;
  }

  .piece.king::after {
    content: '♛';
    font-size: 50%;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    pointer-events: none;
  }

  .piece.selected {
    transform: scale(1.1) translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.5), 0 0 0 3px var(--gold);
    z-index: 10;
  }

  .piece:hover:not(.selected) { transform: scale(1.05); }

  /* STATUS BAR */
  .status-bar {
    width: 100%;
    padding: 0.6rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 0.7rem;
    text-align: center;
    font-size: 0.85rem;
    color: var(--muted);
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .status-bar .highlight { color: var(--gold); font-weight: 600; }
  .status-bar .highlight.red { color: var(--red); }

  /* GAME ACTIONS */
  .game-actions {
    width: 100%;
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.7rem 1.5rem;
    border-radius: 999px;
    font-size: 0.9rem;
    z-index: 1000;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(4px);
  }

  .overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    text-align: center;
    max-width: 320px;
    width: 90%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .modal .trophy {
    font-size: 4rem;
    line-height: 1;
    filter: drop-shadow(0 0 20px rgba(232,201,109,0.6));
    animation: bounce 0.6s ease;
  }

  @keyframes bounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.1em;
    color: var(--gold);
  }

  .modal p { color: var(--muted); font-size: 0.9rem; line-height: 1.5; }

  /* Loading */
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 1rem auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESPONSIVE */
  @media (max-width: 400px) {
    .player-info .name { max-width: 70px; font-size: 0.7rem; }
    .player-info .pieces-count { font-size: 1.3rem; }
    .turn-indicator .whose { font-size: 0.8rem; }
  }

  @media (min-width: 600px) {
    #gameScreen { padding: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1 class="logo">DA<span>M</span>AS</h1>
  <span class="badge online" id="connStatus">● Conectando...</span>
</header>

<!-- HOME -->
<div class="screen active" id="homeScreen">
  <p class="tagline">Jogo de damas online em tempo real</p>

  <div class="input-group">

  <button class="btn btn-secondary" onclick="joinRoom()">→ Entrar na Partida</button>

<div class="screen" id="lobbyScreen">

    <div class="player-slot">
      <div class="piece-icon p2">♟</div>
      <div class="slot-info">
        <div class="slot-name" id="slot2Name"><span class="waiting-dots">Aguardando</span></div>
        <div class="slot-status">Peças escuras (vermelho)</div>
      </div>
    </div>
  </div>

  <div class="spinner" id="lobbySpinner"></div>

  <button class="btn btn-danger btn-sm" onclick="leaveRoom()" style="width:auto; align-self:center;">Sair da Sala</button>
</div>

<!-- GAME -->
<div class="screen" id="gameScreen">
  <div class="game-header">
    <div class="player-info p1">
      <div class="name" id="p1Name">Jogador 1</div>
      <div class="pieces-count" id="p1Count">12</div>
    </div>
    <div class="turn-indicator">
      <div style="font-size:0.7rem; color:var(--muted);">VEZ DE</div>
      <div class="whose" id="turnWho">Laranja</div>
    </div>
    <div class="player-info p2" style="align-items:flex-end;">
      <div class="name" id="p2Name">Jogador 2</div>
      <div class="pieces-count" id="p2Count">12</div>
    </div>
  </div>

  <div class="board-wrap">
    <div id="board"></div>
  </div>

  <div class="status-bar" id="statusBar">Carregando...</div>

  <div class="game-actions">
    <button class="btn btn-secondary btn-sm" onclick="leaveRoom()" style="flex:1;">← Sair</button>
    <button class="btn btn-secondary btn-sm" onclick="offerDraw()" style="flex:1;" id="drawBtn">= Empate</button>
  </div>
</div>

<!-- WIN MODAL -->
<div class="overlay" id="winOverlay">
  <div class="modal">
    <div class="trophy" id="winTrophy">🏆</div>
    <h2 id="winTitle">VITÓRIA!</h2>
    <p id="winMsg">Parabéns, você ganhou!</p>
    <button class="btn btn-primary" onclick="restartGame()">Jogar Novamente</button>
    <button class="btn btn-secondary" onclick="leaveRoom()">Voltar ao Menu</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove, off } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA4YzX9n13TDMI9MkXs3TcRinTbv-wxJEg",
  authDomain: "damas-f39a0.firebaseapp.com",
  projectId: "damas-f39a0",
  databaseURL: "https://damas-f39a0-default-rtdb.firebaseio.com",
  storageBucket: "damas-f39a0.firebasestorage.app",
  messagingSenderId: "429874503307",
  appId: "1:429874503307:web:643824286b3750cab9fe8e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ─── State ───────────────────────────────────────────────
let state = {
  board: null,          // 8x8 grid
  currentTurn: 1,       // 1 or 2
  selectedPiece: null,  // {row, col}
  validMoves: [],       // [{row, col, captures:[]}]
  gameOver: false,
  mode: 'local',        // 'local' | 'online'
  myPlayer: 1,
  roomId: null,
  playerName: '',
  roomRef: null,
  listeners: []
};

// ─── Firebase helpers ─────────────────────────────────────
function makeRoomId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let id = '';
  for (let i = 0; i < 4; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
}

function roomRef(id) { return ref(db, `rooms/${id}`); }

// ─── Board init ───────────────────────────────────────────
function createBoard() {
  const b = [];
  for (let r = 0; r < 8; r++) {
    b[r] = [];
    for (let c = 0; c < 8; c++) {
      let piece = null;
      if ((r + c) % 2 === 1) {
        if (r < 3) piece = { player: 2, king: false };
        else if (r > 4) piece = { player: 1, king: false };
      }
      b[r][c] = piece;
    }
  }
  return b;
}

// ─── Move logic ───────────────────────────────────────────
function getMovesForPiece(board, row, col) {
  const piece = board[row][col];
  if (!piece) return [];
  const moves = [];
  const dirs = piece.king ? [[-1,-1],[-1,1],[1,-1],[1,1]] :
               piece.player === 1 ? [[-1,-1],[-1,1]] : [[1,-1],[1,1]];

  for (const [dr, dc] of dirs) {
    const nr = row + dr, nc = col + dc;
    if (nr < 0 || nr > 7 || nc < 0 || nc > 7) continue;
    if (!board[nr][nc]) {
      moves.push({ row: nr, col: nc, captures: [] });
    } else if (board[nr][nc].player !== piece.player) {
      const jr = nr + dr, jc = nc + dc;
      if (jr >= 0 && jr <= 7 && jc >= 0 && jc <= 7 && !board[jr][jc]) {
        const caps = getMultiCaptures(board, row, col, piece, []);
        if (caps.length > 0) {
          moves.push(...caps);
        } else {
          moves.push({ row: jr, col: jc, captures: [{ row: nr, col: nc }] });
        }
      }
    }
  }
  // If capture exists, filter non-captures
  const hasCap = moves.some(m => m.captures.length > 0);
  return hasCap ? moves.filter(m => m.captures.length > 0) : moves;
}

function getMultiCaptures(board, row, col, piece, alreadyCaptured) {
  const dirs = piece.king ? [[-1,-1],[-1,1],[1,-1],[1,1]] :
               piece.player === 1 ? [[-1,-1],[-1,1]] : [[1,-1],[1,1]];
  const result = [];
  for (const [dr, dc] of dirs) {
    const nr = row + dr, nc = col + dc;
    if (nr < 0 || nr > 7 || nc < 0 || nc > 7) continue;
    if (board[nr][nc] && board[nr][nc].player !== piece.player) {
      const capKey = `${nr},${nc}`;
      if (alreadyCaptured.some(c => c.row === nr && c.col === nc)) continue;
      const jr = nr + dr, jc = nc + dc;
      if (jr >= 0 && jr <= 7 && jc >= 0 && jc <= 7 && !board[jr][jc]) {
        const newCaps = [...alreadyCaptured, { row: nr, col: nc }];
        const deeper = getMultiCaptures(board, jr, jc, piece, newCaps);
        if (deeper.length > 0) result.push(...deeper);
        else result.push({ row: jr, col: jc, captures: newCaps });
      }
    }
  }
  return result;
}

function getAllMandatoryCaptures(board, player) {
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (board[r][c]?.player === player) {
        const moves = getMovesForPiece(board, r, c);
        if (moves.some(m => m.captures.length > 0)) return true;
      }
    }
  }
  return false;
}

function getValidMovesForPlayer(board, player) {
  const hasCapture = getAllMandatoryCaptures(board, player);
  const result = [];
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (board[r][c]?.player === player) {
        let moves = getMovesForPiece(board, r, c);
        if (hasCapture) moves = moves.filter(m => m.captures.length > 0);
        if (moves.length > 0) result.push({ row: r, col: c, moves });
      }
    }
  }
  return result;
}

function applyMove(board, from, to, captures) {
  const nb = board.map(r => r.map(c => c ? { ...c } : null));
  nb[to.row][to.col] = { ...nb[from.row][from.col] };
  nb[from.row][from.col] = null;
  for (const cap of captures) nb[cap.row][cap.col] = null;
  // King promotion
  if (nb[to.row][to.col].player === 1 && to.row === 0) nb[to.row][to.col].king = true;
  if (nb[to.row][to.col].player === 2 && to.row === 7) nb[to.row][to.col].king = true;
  return nb;
}

function countPieces(board) {
  let p1 = 0, p2 = 0;
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
    if (board[r][c]?.player === 1) p1++;
    else if (board[r][c]?.player === 2) p2++;
  }
  return { p1, p2 };
}

function checkWin(board, currentTurn) {
  const { p1, p2 } = countPieces(board);
  if (p1 === 0) return 2;
  if (p2 === 0) return 1;
  const moves = getValidMovesForPlayer(board, currentTurn);
  if (moves.length === 0) return currentTurn === 1 ? 2 : 1;
  return null;
}

// ─── Render ───────────────────────────────────────────────
function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  const { board, selectedPiece, validMoves, currentTurn, myPlayer, mode, gameOver } = state;
  const counts = countPieces(board);

  document.getElementById('p1Count').textContent = counts.p1;
  document.getElementById('p2Count').textContent = counts.p2;

  const turnEl = document.getElementById('turnWho');
  turnEl.textContent = currentTurn === 1 ? 'Laranja' : 'Vermelho';
  turnEl.className = 'whose' + (currentTurn === 2 ? ' red' : '');

  const isMyTurn = mode === 'local' || myPlayer === currentTurn;
  const statusBar = document.getElementById('statusBar');
  if (gameOver) {
    statusBar.innerHTML = 'Jogo encerrado';
  } else if (isMyTurn) {
    statusBar.innerHTML = selectedPiece
      ? `<span class="highlight">Peça selecionada</span> — escolha o destino`
      : `<span class="highlight${currentTurn === 2 ? ' red' : ''}">Sua vez!</span> Selecione uma peça`;
  } else {
    statusBar.innerHTML = `Aguardando adversário<span class="waiting-dots"></span>`;
  }

  const validSet = new Set(validMoves.map(m => `${m.row},${m.col}`));

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const cell = document.createElement('div');
      cell.className = `cell ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
      const cellKey = `${r},${c}`;

      if (validSet.has(cellKey)) {
        cell.classList.add('valid');
        cell.addEventListener('click', () => handleCellClick(r, c));
      }

      const piece = board[r][c];
      if (piece) {
        const el = document.createElement('div');
        el.className = `piece p${piece.player}${piece.king ? ' king' : ''}`;
        if (selectedPiece?.row === r && selectedPiece?.col === c) el.classList.add('selected');
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          handlePieceClick(r, c);
        });
        cell.appendChild(el);
      }

      boardEl.appendChild(cell);
    }
  }
}

// ─── Input handlers ───────────────────────────────────────
function handlePieceClick(row, col) {
  if (state.gameOver) return;
  const { board, currentTurn, myPlayer, mode } = state;
  const piece = board[row][col];
  if (!piece) return;
  const isMyTurn = mode === 'local' || myPlayer === currentTurn;
  if (!isMyTurn) return;
  if (piece.player !== currentTurn) return;

  // Check if this piece has any valid moves considering mandatory captures
  const allValid = getValidMovesForPlayer(board, currentTurn);
  const thisEntry = allValid.find(e => e.row === row && e.col === col);
  if (!thisEntry) { showToast('Esta peça não tem movimentos válidos'); return; }

  state.selectedPiece = { row, col };
  state.validMoves = thisEntry.moves;
  renderBoard();
}

function handleCellClick(row, col) {
  if (!state.selectedPiece || state.gameOver) return;
  const move = state.validMoves.find(m => m.row === row && m.col === col);
  if (!move) return;
  executeMove(state.selectedPiece, move);
}

function executeMove(from, moveTo) {
  const newBoard = applyMove(state.board, from, moveTo, moveTo.captures);
  const nextTurn = state.currentTurn === 1 ? 2 : 1;
  const winner = checkWin(newBoard, nextTurn);

  state.board = newBoard;
  state.currentTurn = nextTurn;
  state.selectedPiece = null;
  state.validMoves = [];

  if (winner) {
    state.gameOver = true;
    renderBoard();
    showWin(winner);
  } else {
    renderBoard();
  }

  if (state.mode === 'online') {
    syncToFirebase();
  }
}

// ─── Firebase sync ────────────────────────────────────────
async function syncToFirebase() {
  if (!state.roomId) return;
  const payload = {
    board: JSON.stringify(state.board),
    currentTurn: state.currentTurn,
    gameOver: state.gameOver,
    updatedAt: Date.now()
  };
  await update(roomRef(state.roomId), payload);
}

function listenToRoom(id) {
  const r = ref(db, `rooms/${id}`);
  const unsub = onValue(r, (snap) => {
    if (!snap.exists()) { leaveRoom(); return; }
    const data = snap.val();
    updateConnStatus(true);

    // Update lobby player slots
    document.getElementById('slot1Name').textContent = data.p1Name || 'Aguardando...';
    document.getElementById('slot2Name').textContent = data.p2Name || 'Aguardando...';

    // If both players in and game not started — start
    if (data.p1Name && data.p2Name && data.board && !state.board) {
      document.getElementById('p1Name').textContent = data.p1Name;
      document.getElementById('p2Name').textContent = data.p2Name;
      state.board = JSON.parse(data.board);
      state.currentTurn = data.currentTurn || 1;
      state.gameOver = data.gameOver || false;
      showScreen('gameScreen');
      renderBoard();
      return;
    }

    // Lobby waiting
    if (data.p1Name && !data.p2Name) {
      showScreen('lobbyScreen');
    }

    // Game sync from opponent
    if (state.board && data.board) {
      const remote = JSON.parse(data.board);
      const remoteBoard = JSON.stringify(remote);
      const localBoard = JSON.stringify(state.board);
      if (remoteBoard !== localBoard || data.currentTurn !== state.currentTurn || data.gameOver !== state.gameOver) {
        state.board = remote;
        state.currentTurn = data.currentTurn;
        state.gameOver = data.gameOver;
        state.selectedPiece = null;
        state.validMoves = [];
        document.getElementById('p1Name').textContent = data.p1Name;
        document.getElementById('p2Name').textContent = data.p2Name;
        showScreen('gameScreen');
        renderBoard();
        if (state.gameOver) {
          const winner = checkWin(state.board, state.currentTurn);
          if (winner) showWin(winner);
        }
      }
    }
  }, (err) => {
    updateConnStatus(false);
    showToast('Erro de conexão. Tente reconectar.');
  });
  state.listeners.push({ ref: r, unsub });
}

// ─── Screens ──────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── Public actions ───────────────────────────────────────
window.createRoom = async function () {
  const name = document.getElementById('playerName').value.trim() || 'Jogador 1';
  state.playerName = name;
  state.myPlayer = 1;
  const id = makeRoomId();
  state.roomId = id;
  state.mode = 'online';
  const board = createBoard();

  await set(roomRef(id), {
    p1Name: name,
    p2Name: null,
    board: JSON.stringify(board),
    currentTurn: 1,
    gameOver: false,
    createdAt: Date.now()
  });

  document.getElementById('lobbyCode').textContent = id;
  document.getElementById('slot1Name').textContent = name;
  document.getElementById('slot2Name').innerHTML = '<span class="waiting-dots">Aguardando</span>';
  showScreen('lobbyScreen');
  listenToRoom(id);
};

window.joinRoom = async function () {
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  if (code.length !== 4) { showToast('Código deve ter 4 caracteres'); return; }
  const name = document.getElementById('playerName').value.trim() || 'Jogador 2';
  state.playerName = name;
  state.myPlayer = 2;
  state.mode = 'online';

  const snap = await get(roomRef(code));
  if (!snap.exists()) { showToast('Sala não encontrada'); return; }
  const data = snap.val();
  if (data.p2Name) { showToast('Sala já está cheia'); return; }

  state.roomId = code;
  await update(roomRef(code), { p2Name: name });

  document.getElementById('lobbyCode').textContent = code;
  document.getElementById('slot1Name').textContent = data.p1Name;
  document.getElementById('slot2Name').textContent = name;
  document.getElementById('p1Name').textContent = data.p1Name;
  document.getElementById('p2Name').textContent = name;

  state.board = JSON.parse(data.board);
  state.currentTurn = data.currentTurn || 1;
  showScreen('gameScreen');
  renderBoard();
  listenToRoom(code);
};

window.startLocal = function () {
  state.mode = 'local';
  state.myPlayer = 1;
  state.board = createBoard();
  state.currentTurn = 1;
  state.selectedPiece = null;
  state.validMoves = [];
  state.gameOver = false;
  state.roomId = null;
  document.getElementById('p1Name').textContent = 'Jogador 1';
  document.getElementById('p2Name').textContent = 'Jogador 2';
  showScreen('gameScreen');
  renderBoard();
};

window.leaveRoom = async function () {
  if (state.roomId && state.mode === 'online') {
    // Clean up listeners
    state.listeners.forEach(({ ref: r }) => off(r));
    state.listeners = [];
    // Remove room
    await remove(roomRef(state.roomId)).catch(() => {});
  }
  state.board = null;
  state.roomId = null;
  state.selectedPiece = null;
  state.validMoves = [];
  state.gameOver = false;
  document.getElementById('winOverlay').classList.remove('show');
  showScreen('homeScreen');
};

window.restartGame = async function () {
  document.getElementById('winOverlay').classList.remove('show');
  const board = createBoard();
  state.board = board;
  state.currentTurn = 1;
  state.selectedPiece = null;
  state.validMoves = [];
  state.gameOver = false;

  if (state.mode === 'online') {
    await syncToFirebase();
    await update(roomRef(state.roomId), { currentTurn: 1, gameOver: false });
  }
  renderBoard();
};

window.offerDraw = function () {
  showToast('Empate proposto ao adversário (em desenvolvimento)');
};

// ─── Win / Toast ──────────────────────────────────────────
function showWin(winner) {
  const myWin = state.mode === 'local' || winner === state.myPlayer;
  document.getElementById('winTrophy').textContent = myWin ? '🏆' : '💀';
  document.getElementById('winTitle').textContent = myWin ? 'VITÓRIA!' : 'DERROTA';
  const name = winner === 1
    ? document.getElementById('p1Name').textContent
    : document.getElementById('p2Name').textContent;
  document.getElementById('winMsg').textContent = myWin
    ? `Parabéns, você venceu!`
    : `${name} ganhou esta partida.`;
  document.getElementById('winOverlay').classList.add('show');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function updateConnStatus(ok) {
  const el = document.getElementById('connStatus');
  el.textContent = ok ? '● Conectado' : '● Desconectado';
  el.className = 'badge ' + (ok ? 'online' : '');
}

// ─── Init ─────────────────────────────────────────────────
updateConnStatus(true);
document.getElementById('connStatus').textContent = '● Firebase OK';
</script>
